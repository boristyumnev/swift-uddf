name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      matrix:
        swift: ["6.0"]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  test-ios:
    name: iOS Simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: List available simulators
        run: xcrun simctl list devices available | head -30
      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme swift-uddf \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Test on iOS Simulator
        run: |
          DEST=$(xcodebuild -scheme swift-uddf -showdestinations 2>/dev/null \
            | grep 'iOS Simulator' \
            | grep 'iPhone' \
            | head -1 \
            | sed 's/.*{ //' | sed 's/ }$//')
          echo "Using destination: $DEST"
          xcodebuild test \
            -scheme swift-uddf \
            -destination "$DEST" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build-compat:
    name: Build ${{ matrix.platform }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            destination: "generic/platform=macOS"
          - platform: iOS
            destination: "generic/platform=iOS Simulator"
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild build \
            -scheme swift-uddf \
            -destination '${{ matrix.destination }}' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
