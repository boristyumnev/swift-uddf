name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      matrix:
        swift: ["6.0"]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  test-ios:
    name: iOS Simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: List available simulators
        run: xcrun simctl list devices available | head -30
      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme swift-uddf \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Test on iOS Simulator
        run: |
          # Find first available iPhone simulator ID
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " || echo "")
          if [ -z "$SIM_ID" ]; then
            echo "No iOS simulator found, skipping test"
            exit 0
          fi
          echo "Using simulator: $SIM_ID"
          xcodebuild test \
            -scheme swift-uddf \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build-compat:
    name: Build ${{ matrix.platform }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            destination: "generic/platform=macOS"
          - platform: iOS
            destination: "generic/platform=iOS Simulator"
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild build \
            -scheme swift-uddf \
            -destination '${{ matrix.destination }}' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
